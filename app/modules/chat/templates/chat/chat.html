{% extends "base.html" %}

{% block title %}Chat - Workspace{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('chat.static', filename='css/chat.css') }}">
{% endblock %}

{% block content %}
<div class="chat-layout">
    <!-- Conversation List Panel -->
    <aside class="conv-panel">
        <div class="conv-panel-header">
            <h2>Chats</h2>
            <button class="btn-new-chat" id="btnNewChat" title="New Chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
        <ul class="conv-list" id="convList"></ul>
    </aside>

    <!-- Chat Area -->
    <section class="chat-area">
        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty" id="chatEmpty">
                <div class="chat-empty-icon">💬</div>
                <p>새 대화를 시작해보세요</p>
            </div>
        </div>
        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <textarea
                    id="chatInput"
                    placeholder="메시지를 입력하세요..."
                    rows="1"
                    autocomplete="off"
                ></textarea>
                <button class="btn-send" id="btnSend" title="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('chat.static', filename='js/chat.js') }}"></script>
{% endblock %}
